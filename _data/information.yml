-   title: Assistant Professor
    company: Gyeongkuk National University (formerly Andong National University)
    description: Taehun Yang is an assistant professor in the Computer Science and Engineering Major, School of IT Convergence Engineering at Gyeongkuk National University (formerly Andong National University), where he has been serving since 2023. He was a postdoctoral researcher at Kongju National University from 2022 to 2023. He received his Ph.D. in Computer Engineering from Chungnam National University in 2022 and his B.S. in Computer Engineering from the same university in 2014. His research interests include computer communications, mobile computing, wireless communications, Internet of Things, and digital twins.
